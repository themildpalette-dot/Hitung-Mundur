(async function boot(){
  if(CLOUD_ENABLED && typeof supabase!=='undefined'){
    if(location.hash.includes('type=recovery')) recoveryMode=true;
    sb=supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
    // PENTING: jangan await pemanggilan Supabase langsung di dalam callback ini
    // (auth memegang lock → bisa deadlock). Tunda dengan setTimeout(0).
    sb.auth.onAuthStateChange((event,session)=>{ setTimeout(()=>handleAuth(event,session),0); });
    // jaring pengaman jika callback tidak terpanggil
    setTimeout(async ()=>{
      const b=$('#boot');
      if(b && b.style.display!=='none' && !currentUser && !recoveryMode){
        try{ const {data:{session}}=await sb.auth.getSession(); if(!session){ hideBoot(); showAuth(); } }
        catch(e){ hideBoot(); showAuth(); }
      }
    },5000);
  }else{
    // Mode lokal (Supabase belum dikonfigurasi)
    const saved=await localGet();
    if(saved){ try{ state=Object.assign(defaultData(),JSON.parse(saved)); }catch(e){} }
    enterApp();
  }
})();
async function handleAuth(event,session){
  if(event==='PASSWORD_RECOVERY' || recoveryMode){
    recoveryMode=true;
    if(session && session.user) currentUser=session.user;
    hideBoot(); showResetForm();
    return;
  }
  if(session && session.user){
    const fresh = !currentUser || currentUser.id!==session.user.id;
    currentUser=session.user;
    if(fresh){
      try{
        await fetchProfile();
        if(userStatus!=='approved'){ hideBoot(); (userStatus==='rejected'?showRejectedScreen:showPendingScreen)(); return; }
        if(isAdmin){ enterAdminConsole(); return; }
        await resolveActiveWedding(); await cloudLoad(); subscribeRealtime();
      }catch(e){ console.error(e); }
    }else if(userStatus!=='approved'){ hideBoot(); (userStatus==='rejected'?showRejectedScreen:showPendingScreen)(); return; }
    else if(isAdmin){ enterAdminConsole(); return; }
    enterApp();
  }else{
    currentUser=null;
    if(rtChannel){ sb.removeChannel(rtChannel); rtChannel=null; }
    hideBoot(); showAuth();
  }
}

/* ============================================================ APPROVAL GATE & ADMIN ============================================================ */
async function fetchProfile(){
  try{
    const {data,error}=await sb.from('profiles').select('status,is_admin').eq('id',currentUser.id).maybeSingle();
    if(error) throw error;                 // tabel belum dibuat → gate nonaktif (lihat catch)
    userStatus = data ? (data.status||'pending') : 'pending';
    isAdmin = data ? !!data.is_admin : false;
  }catch(e){
    // Jika tabel profiles belum ada (SQL belum dijalankan), jangan kunci siapa pun.
    userStatus='approved'; isAdmin=false;
  }
}

async function recheckStatus(){
  await fetchProfile();
  if(userStatus==='approved'){
    if(isAdmin){ enterAdminConsole(); return; }
    try{ await resolveActiveWedding(); await cloudLoad(); subscribeRealtime(); }catch(e){ console.error(e); } enterApp();
  }
  else if(userStatus==='rejected'){ showRejectedScreen(); }
  else { toast('Masih menunggu persetujuan admin'); }
}

async function exportAllAccounts(){
  toast('Menyiapkan ekspor…');
  try{
    const [{data:weds,error:we},{data:profs}]=await Promise.all([
      sb.from('weddings').select('user_id,data,updated_at'),
      sb.from('profiles').select('id,email,status,is_admin,created_at')
    ]);
    if(we) throw we;
    const pmap={}; (profs||[]).forEach(p=>pmap[p.id]=p);
    const accounts=(weds||[]).map(w=>{ const p=pmap[w.user_id]||{}; return { user_id:w.user_id, username:displayUser(p.email||''), status:p.status||'', updated_at:w.updated_at, data:w.data }; });
    const out={ exported_at:new Date().toISOString(), app:APP_NAME, total_accounts:accounts.length, accounts };
    const blob=new Blob([JSON.stringify(out,null,2)],{type:'application/json'});
    const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
    a.download=`bigday-semua-akun-${new Date().toISOString().slice(0,10)}.json`;
    a.click(); URL.revokeObjectURL(a.href);
    toast(`Ekspor selesai — ${accounts.length} akun ⬇`);
  }catch(e){ console.error(e); toast('Gagal ekspor. Jalankan dulu kebijakan admin-read di Supabase.'); }
}

    `;

async function loadAdminUsers(){
  const box=$('#adminList');
  try{
    const [{data:profs,error:pe},{data:weds}]=await Promise.all([
      sb.from('profiles').select('id,email,status,is_admin,created_at').order('created_at',{ascending:false}),
      sb.from('weddings').select('user_id,updated_at')
    ]);
    if(pe) throw pe;
    const wmap={}; (weds||[]).forEach(w=>wmap[w.user_id]=w.updated_at);
    adminUsers=(profs||[]).map(u=>({...u,_active:wmap[u.id]||null}));
    const pending=adminUsers.filter(u=>u.status==='pending');
    const approved=adminUsers.filter(u=>u.status==='approved');
    const rejected=adminUsers.filter(u=>u.status==='rejected');
    const stats=$('#admStats');
    if(stats) stats.innerHTML =
      admStat('Total', adminUsers.length, 'grape')
      + admStat('Menunggu', pending.length, 'coral')
      + admStat('Disetujui', approved.length, 'mint')
      + admStat('Ditolak', rejected.length, 'rose');
    renderAdminList();
  }catch(e){ console.error(e); if(box) box.innerHTML='<div class="warn">Gagal memuat. Pastikan SQL panel admin sudah dijalankan di Supabase.</div>'; }
}
function renderAdminList(){
  const box=$('#adminList'); if(!box) return;
  const q=($('#admSearch')?.value||'').trim().toLowerCase();
  const sort=$('#admSort')?.value||'new';
  if(!adminUsers.length){ box.innerHTML='<p class="pdf-empty">Belum ada pengguna.</p>'; return; }
  let list=adminUsers.slice();
  if(q) list=list.filter(u=>(displayUser(u.email)||'').toLowerCase().includes(q));
  const sorters={
    new:(a,b)=>new Date(b.created_at)-new Date(a.created_at),
    old:(a,b)=>new Date(a.created_at)-new Date(b.created_at),
    name:(a,b)=>(displayUser(a.email)||'').localeCompare(displayUser(b.email)||''),
    active:(a,b)=>new Date(b._active||0)-new Date(a._active||0)
  };
  list.sort(sorters[sort]||sorters.new);
  if(!list.length){ box.innerHTML=`<p class="pdf-empty">Tidak ada pengguna cocok “${esc(q)}”.</p>`; return; }
  const pending=list.filter(u=>u.status==='pending');
  const others=list.filter(u=>u.status!=='pending');
  box.innerHTML =
    (pending.length?`<div class="admin-h">Menunggu Persetujuan (${pending.length})</div>`+pending.map(adminRow).join(''):'')
    + (others.length?`<div class="admin-h" style="margin-top:${pending.length?'18px':'0'}">${q?'Hasil':'Semua Pengguna'} (${others.length})</div>`+others.map(adminRow).join(''):'');
}
function admStat(label,n,color){ return `<div class="adm-stat" style="--c:var(--${color})"><b>${n}</b><span>${label}</span></div>`; }
function shortDate(iso){ if(!iso) return '-'; try{ return new Date(iso).toLocaleDateString('id-ID',{day:'numeric',month:'short',year:'numeric'}); }catch(e){ return '-'; } }
function relTime(iso){
  if(!iso) return '-';
  const t=new Date(iso).getTime(); if(isNaN(t)) return '-';
  const s=Math.floor((Date.now()-t)/1000);
  if(s<60) return 'baru saja';
  const mi=Math.floor(s/60); if(mi<60) return mi+' menit lalu';
  const h=Math.floor(mi/60); if(h<24) return h+' jam lalu';
  const d=Math.floor(h/24); if(d<7) return d+' hari lalu';
  const w=Math.floor(d/7); if(w<5) return w+' minggu lalu';
  const mo=Math.floor(d/30); if(mo<12) return mo+' bulan lalu';
  return Math.floor(d/365)+' tahun lalu';
}
async function loadAnnounceEditor(){

    toast(active&&text?'Pengumuman aktif 📢':'Pengumuman disimpan');
  }catch(e){ console.error(e); toast('Gagal menyimpan. Jalankan dulu SQL app_config di Supabase.'); }
}

function adminRow(u){
  const m={pending:['#FFF4E5','#c2691b','Menunggu'],approved:['#E6Faf5','#0f9d7a','Disetujui'],rejected:['#FFF1F3','#be123c','Ditolak']}[u.status]||['#F1F0F4','#666',u.status];
  const me=u.id===currentUser.id;
  return `<div class="admin-row">
    <div class="admin-info">
      <b>${esc(displayUser(u.email)||u.id.slice(0,8))}${u.is_admin?' 👑':''}${me?' (kamu)':''}</b>
      <span class="st-badge" style="background:${m[0]};color:${m[1]}">${m[2]}</span>
      <span class="admin-meta">Daftar ${shortDate(u.created_at)} · ${u._active?('aktif '+relTime(u._active)):'belum ada data'}</span>
    </div>
    <div class="admin-acts">
      <button class="btn btn-ghost" data-act="view-account" data-id="${u.id}" style="padding:7px 12px">Lihat</button>
      ${u.status!=='approved'?`<button class="btn btn-pri" data-act="approve-user" data-id="${u.id}" style="padding:7px 12px">Setujui</button>`:''}
      ${(u.status!=='rejected' && !me)?`<button class="btn btn-danger" data-act="reject-user" data-id="${u.id}" style="padding:7px 12px">Tolak</button>`:''}
      ${!me?`<button class="btn btn-ghost" data-act="reset-pass-user" data-id="${u.id}" style="padding:7px 12px;color:var(--grape)">🔑 Reset Sandi</button>`:''}
    </div>
  </div>`;
}
function resetUserPass(id){
  const u=(adminUsers||[]).find(x=>x.id===id);
  const who=u?(displayUser(u.email)||id.slice(0,8)):'pengguna ini';
  openModal(`<div class="modal-head"><h3>Reset Sandi</h3><button class="modal-x" data-act="close">✕</button></div>
    <div class="modal-body">
      <p style="font-size:13px;color:var(--ink-soft);margin:0 0 12px;line-height:1.5">Buat kata sandi sementara untuk <b>${esc(who)}</b>. Beri tahu sandi ini ke pemiliknya, lalu minta dia menggantinya sendiri setelah masuk lewat menu ⚙️.</p>
      <div id="rs-err" style="display:none;background:#FFF1F3;color:#be123c;border:1px solid #FBD5DC;border-radius:10px;padding:9px 12px;font-size:12.5px;margin-bottom:12px"></div>
      <div class="mfield"><label>Kata Sandi Sementara</label><div class="pass-wrap"><input type="text" id="rs-pass" placeholder="minimal 6 karakter" autocomplete="off" spellcheck="false"><button type="button" class="pass-eye on" data-act="toggle-pass" data-target="rs-pass" title="Lihat / sembunyikan">🙈</button></div></div>
      <button class="btn btn-pri btn-block" data-act="submit-reset-pass" data-id="${id}" style="margin-top:6px">Reset Sandi Sekarang</button>
    </div>`);
  setTimeout(()=>{const e=$('#rs-pass'); if(e) e.focus();},60);
}
function rsError(m){ const e=$('#rs-err'); if(e){ e.textContent=m; e.style.display='block'; } }
async function submitResetPass(id){
  const p=$('#rs-pass')?.value||'';
  if(p.length<6){ rsError('Kata sandi minimal 6 karakter.'); return; }
  const btn=$('[data-act="submit-reset-pass"]'); if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span>'; }
  try{
    const {error}=await sb.rpc('admin_reset_password',{target_user:id,new_password:p});
    if(error) throw error;
    closeModal();
    const u=(adminUsers||[]).find(x=>x.id===id);
    toast('Sandi '+(u?displayUser(u.email):'pengguna')+' berhasil direset 🔐');
  }catch(e){
    const msg=(e&&e.message)||'';
    let t='Gagal reset: '+msg;
    if(msg.includes('Tidak diizinkan')) t='Hanya admin yang bisa reset.';
    else if(/function|does not exist|schema|admin_reset_password|could not find/i.test(msg)) t='Fungsi SQL belum dijalankan. Jalankan dulu SQL admin_reset_password di Supabase.';
    rsError(t);
    if(btn){ btn.disabled=false; btn.textContent='Reset Sandi Sekarang'; }
  }
}
async function approveUser(id){
  try{ const {error}=await sb.from('profiles').update({status:'approved'}).eq('id',id); if(error) throw error; toast('Pengguna disetujui ✅'); }
  catch(e){ console.error(e); toast('Gagal menyetujui'); }
  loadAdminUsers();
}
async function rejectUser(id){
  if(!confirm('Tolak / cabut akses pengguna ini?')) return;
  try{ const {error}=await sb.from('profiles').update({status:'rejected'}).eq('id',id); if(error) throw error; toast('Pengguna ditolak'); }
  catch(e){ console.error(e); toast('Gagal menolak'); }
  loadAdminUsers();
}
