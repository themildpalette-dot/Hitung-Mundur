<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NaikPelaminan — Perencana Pernikahan</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --rose:#FF4D8D;
  --coral:#FF7A59;
  --gold:#FFC83D;
  --mint:#2DD4BF;
  --grape:#8B5CF6;
  --cream:#FFF6F0;
  --ink:#43233A;
  --ink-soft:#7A5C70;
  --line:#F0DCE4;
  --card:#FFFFFF;
  --r-lg:24px;
  --r-md:18px;
  --r-sm:12px;
  --sh-1:0 2px 8px rgba(67,35,58,.06);
  --sh-2:0 12px 32px rgba(255,77,141,.12);
  --grad:linear-gradient(120deg,var(--rose),var(--coral) 55%,var(--gold));
  --glow1:#FFE7EF;
  --glow2:#FFF3D9;
  --font-d:"Fraunces",Georgia,serif;
  --font-b:"Plus Jakarta Sans",system-ui,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{
  font-family:var(--font-b);
  color:var(--ink);
  background:
    radial-gradient(1200px 600px at 80% -10%, var(--glow1) 0%, transparent 60%),
    radial-gradient(900px 500px at -10% 10%, var(--glow2) 0%, transparent 55%),
    var(--cream);
  background-attachment:fixed;
  line-height:1.5;
  -webkit-font-smoothing:antialiased;
}
button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
input,select,textarea{font-family:inherit;font-size:15px;color:var(--ink)}
::selection{background:var(--rose);color:#fff}

/* ---------- TOPBAR ---------- */
.topbar{
  position:sticky;top:0;z-index:40;
  display:flex;align-items:center;justify-content:space-between;
  gap:12px;padding:12px clamp(16px,4vw,40px);
  background:rgba(255,246,240,.82);
  backdrop-filter:saturate(1.4) blur(14px);
  border-bottom:1px solid var(--line);
}
.brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:15px;letter-spacing:.2px}
.brand .ring{
  width:34px;height:34px;border-radius:50%;display:grid;place-items:center;
  background:var(--grad);color:#fff;font-family:var(--font-d);font-weight:600;font-size:17px;
  box-shadow:var(--sh-2);
}
.brand small{display:block;font-weight:600;color:var(--ink-soft);font-size:11px;letter-spacing:.6px;text-transform:uppercase}
.topbar-right{display:flex;align-items:center;gap:8px}
.chip-count{
  display:flex;align-items:center;gap:7px;padding:7px 13px;border-radius:999px;
  background:#fff;border:1px solid var(--line);font-weight:700;font-size:13px;box-shadow:var(--sh-1);
}
.chip-count b{color:var(--rose);font-size:15px}
.chip-count .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);box-shadow:0 0 0 4px rgba(45,212,191,.18)}
.icon-btn{
  width:40px;height:40px;border-radius:12px;display:grid;place-items:center;
  background:#fff;border:1px solid var(--line);box-shadow:var(--sh-1);
  font-size:18px;transition:transform .15s,box-shadow .2s;
}
.icon-btn:hover{transform:translateY(-2px);box-shadow:var(--sh-2)}

/* ---------- HERO ---------- */
.hero{
  position:relative;overflow:hidden;
  margin:clamp(16px,3vw,28px) clamp(16px,4vw,40px) 0;
  border-radius:var(--r-lg);
  background:var(--grad);
  color:#fff;
  padding:clamp(30px,5vw,56px) clamp(22px,5vw,48px);
  box-shadow:var(--sh-2);
  isolation:isolate;
}
.hero::before{
  content:"";position:absolute;inset:0;z-index:-1;
  background:
    radial-gradient(420px 200px at 12% 0%, rgba(255,255,255,.30), transparent 70%),
    radial-gradient(360px 240px at 100% 100%, rgba(139,92,246,.35), transparent 70%);
}
.hero-eyebrow{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.35);
  padding:6px 14px;border-radius:999px;font-weight:700;font-size:12px;letter-spacing:1px;text-transform:uppercase;
  backdrop-filter:blur(4px);
}
.hero-names{
  font-family:var(--font-d);font-weight:600;
  font-size:clamp(34px,7vw,64px);line-height:1.02;
  margin:16px 0 6px;text-shadow:0 4px 24px rgba(67,35,58,.18);
  cursor:pointer;
}
.hero-names .amp{font-style:italic;font-weight:400;opacity:.92;padding:0 .12em}
.hero-date{font-weight:600;font-size:clamp(15px,2.4vw,19px);opacity:.95;display:flex;align-items:center;gap:8px;cursor:pointer}
.hero-date .edit-hint{font-size:13px;opacity:.7;font-weight:600;border-bottom:1px dashed rgba(255,255,255,.6)}
.countdown{display:flex;gap:clamp(8px,2vw,16px);margin-top:clamp(20px,3vw,30px);flex-wrap:wrap}
.cd-block{
  background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.28);
  border-radius:16px;padding:clamp(10px,2vw,16px) clamp(14px,3vw,24px);
  min-width:clamp(64px,16vw,92px);text-align:center;backdrop-filter:blur(6px);
}
.cd-num{font-family:var(--font-d);font-weight:600;font-size:clamp(26px,5vw,44px);line-height:1}
.cd-lbl{font-size:11px;font-weight:700;letter-spacing:1.4px;text-transform:uppercase;opacity:.85;margin-top:6px}
.hero-done{font-family:var(--font-d);font-size:clamp(22px,4vw,34px);font-weight:600;margin-top:18px}
.petal{position:absolute;top:-30px;z-index:-1;font-size:18px;opacity:.55;pointer-events:none;animation:fall linear infinite}
@keyframes fall{
  0%{transform:translateY(-40px) rotate(0deg);opacity:0}
  10%{opacity:.6}
  100%{transform:translateY(120vh) rotate(360deg);opacity:0}
}

/* ---------- TABS ---------- */
.tabs{
  position:sticky;top:65px;z-index:30;
  display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;
  padding:18px clamp(16px,4vw,40px) 6px;
}
.tabs::-webkit-scrollbar{display:none}
.tab{
  flex:0 0 auto;display:flex;align-items:center;gap:8px;
  padding:10px 18px;border-radius:999px;font-weight:700;font-size:14px;
  background:#fff;border:1px solid var(--line);color:var(--ink-soft);
  box-shadow:var(--sh-1);transition:.18s;white-space:nowrap;
}
.tab:hover{color:var(--ink);transform:translateY(-1px)}
.tab.active{background:var(--grad);color:#fff;border-color:transparent;box-shadow:var(--sh-2)}
.tab .emo{font-size:16px}

/* ---------- LAYOUT ---------- */
.view{padding:14px clamp(16px,4vw,40px) 60px;max-width:1180px;margin:0 auto}
.grid{display:grid;gap:16px}
.cols-4{grid-template-columns:repeat(4,1fr)}
.cols-2{grid-template-columns:1.15fr .85fr}
.section-head{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:6px 2px 4px}
.section-head h2{font-family:var(--font-d);font-weight:600;font-size:clamp(20px,3vw,26px)}
.section-head p{color:var(--ink-soft);font-size:13px;font-weight:500}

.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-md);padding:20px;box-shadow:var(--sh-1)}
.card.pad-lg{padding:24px}

/* stat cards */
.stat{position:relative;overflow:hidden}
.stat::after{content:"";position:absolute;right:-24px;top:-24px;width:90px;height:90px;border-radius:50%;opacity:.10;background:currentColor}
.stat .ic{width:42px;height:42px;border-radius:12px;display:grid;place-items:center;font-size:20px;color:#fff;margin-bottom:14px}
.stat .lbl{font-size:12.5px;font-weight:700;color:var(--ink-soft);letter-spacing:.3px;text-transform:uppercase}
.stat .val{font-family:var(--font-d);font-weight:600;font-size:clamp(22px,3vw,30px);margin-top:3px;letter-spacing:-.5px}
.stat .sub{font-size:12.5px;font-weight:600;margin-top:6px;color:var(--ink-soft)}
.stat .sub .up,.stat .sub.up{color:#dc2626;font-weight:700}
.stat .sub .ok,.stat .sub.ok{color:#0f9d7a;font-weight:700}
.c-rose{color:var(--rose)} .bg-rose{background:var(--rose)}
.c-coral{color:var(--coral)} .bg-coral{background:var(--coral)}
.c-gold{color:#E0A500} .bg-gold{background:var(--gold)}
.c-mint{color:#0f9d7a} .bg-mint{background:var(--mint)}
.c-grape{color:var(--grape)} .bg-grape{background:var(--grape)}

/* progress */
.bar{height:12px;border-radius:999px;background:#F4E6EC;overflow:hidden}
.bar > span{display:block;height:100%;border-radius:999px;transition:width .5s cubic-bezier(.4,0,.2,1)}
.bar.thin{height:8px}
.progress-meta{display:flex;flex-wrap:wrap;gap:6px 18px;margin-top:12px;font-size:13px;font-weight:600;color:var(--ink-soft)}
.progress-meta b{color:var(--ink)}
.warn{margin-top:12px;background:#FFF1F3;color:#be123c;border:1px solid #FFD7DE;padding:10px 14px;border-radius:12px;font-size:13px;font-weight:600}

/* donut */
.donut-wrap{position:relative;width:200px;height:200px;margin:4px auto 0;flex:0 0 auto}
.donut-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center}
.donut-center .t{font-size:11px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.5px}
.donut-center .n{font-family:var(--font-d);font-weight:600;font-size:21px;letter-spacing:-.5px}
.legend{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.legend-row{display:flex;align-items:center;gap:10px;font-size:13.5px}
.legend-row .sw{width:11px;height:11px;border-radius:4px;flex:0 0 auto}
.legend-row .nm{flex:1;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.legend-row .vl{font-weight:700;color:var(--ink-soft);font-variant-numeric:tabular-nums}
.donut-flex{display:flex;gap:22px;align-items:center;flex-wrap:wrap}
.donut-flex .legend{flex:1;min-width:200px}

/* budget category */
.cat{display:flex;flex-direction:column;gap:12px;padding:16px 18px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;box-shadow:var(--sh-1)}
.cat-top{display:flex;align-items:center;gap:10px}
.cat-dot{width:12px;height:12px;border-radius:4px;flex:0 0 auto}
.cat-name{font-weight:700;font-size:15px;flex:1}
.cat-name[contenteditable]{outline:none;border-radius:6px;padding:1px 4px;margin-left:-4px}
.cat-name[contenteditable]:focus{background:#FFF1F6;box-shadow:0 0 0 2px rgba(255,77,141,.25)}
.cat-del{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;color:var(--ink-soft);font-size:16px;transition:.15s}
.cat-del:hover{background:#FFF1F3;color:#e11d48}
.cat-fields{display:flex;flex-direction:column;gap:9px}
.field{display:flex;flex-direction:row;align-items:center;gap:10px}
.field label{flex:0 0 86px;font-size:10px;font-weight:800;color:var(--ink-soft);letter-spacing:.2px;text-transform:uppercase;line-height:1.2}
.money-in{display:flex;flex:1;min-width:0;align-items:center;gap:6px;background:#FBF3F7;border:1.5px solid #F2DDE7;border-radius:11px;padding:11px 13px;transition:.15s}
.money-in:focus-within{border-color:var(--rose);background:#fff;box-shadow:0 0 0 3px rgba(255,77,141,.12)}
.money-in .rp{font-weight:700;color:var(--ink-soft);font-size:13px;flex:0 0 auto}
.money-in input{border:none;background:none;width:100%;min-width:0;font-weight:700;font-size:15px;font-variant-numeric:tabular-nums;outline:none}
.cat .ratio{font-size:12px;font-weight:600;color:var(--ink-soft);display:flex;justify-content:space-between}

/* vendor */
.vfilter{display:flex;gap:8px;flex-wrap:wrap;margin:4px 0 4px}
.vfilter button{padding:8px 15px;border-radius:999px;font-weight:700;font-size:13px;background:#fff;border:1px solid var(--line);color:var(--ink-soft);box-shadow:var(--sh-1);transition:.15s}
.vfilter button.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.vfilter-cat{margin-top:8px}
.vfilter-lbl{align-self:center;font-size:11px;font-weight:800;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin-right:2px}
.vfilter-cat button.on{background:linear-gradient(135deg,var(--rose),var(--coral));border-color:transparent}
.vgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.vendor{display:flex;flex-direction:column;gap:12px;padding:18px;border:1px solid var(--line);border-radius:var(--r-md);background:#fff;box-shadow:var(--sh-1);transition:.2s}
.vendor:hover{transform:translateY(-3px);box-shadow:var(--sh-2)}
.vendor-head{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.vendor-head h3{font-size:17px;font-weight:800;line-height:1.2}
.vtag{display:inline-block;padding:3px 10px;border-radius:999px;font-size:11px;font-weight:700;margin-top:5px}
.vtags{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.vtags .vtag{margin-top:0}
.vcat-pick{display:flex;flex-wrap:wrap;gap:8px}
.vcat{padding:8px 13px;border-radius:999px;border:1.5px solid var(--line);background:#fff;color:var(--ink-soft);font-size:13px;font-weight:600;cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.vcat:hover{border-color:var(--rose)}
.vcat.on{background:linear-gradient(135deg,var(--rose),var(--coral));border-color:transparent;color:#fff;box-shadow:0 4px 12px -4px rgba(255,77,141,.5)}
.ses-list{display:flex;flex-direction:column;gap:8px}
.ses-row{display:flex;align-items:center;gap:12px;padding:13px 15px;background:#fff;border:1px solid var(--line);border-radius:var(--r-md);box-shadow:var(--sh-1);cursor:pointer;transition:.15s;-webkit-tap-highlight-color:transparent}
.ses-row:hover{border-color:var(--rose)}
.ses-check{width:24px;height:24px;flex:0 0 auto;border-radius:7px;border:2px solid var(--line);display:grid;place-items:center;font-size:14px;font-weight:800;color:#fff;transition:.15s}
.ses-row.done .ses-check{background:var(--mint,#34d399);border-color:transparent}
.ses-name{flex:1;font-weight:600;font-size:15px}
.ses-row.done .ses-name{text-decoration:line-through;color:var(--ink-soft)}
.ses-chips{display:flex;flex-wrap:wrap;gap:8px}
.ses-chip{padding:7px 12px;border-radius:999px;border:1.5px dashed var(--line);background:#fff;color:var(--ink-soft);font-size:12.5px;font-weight:600;cursor:pointer;transition:.15s}
.ses-chip:hover{border-color:var(--rose);color:var(--rose);border-style:solid}
.badge{padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:800;white-space:nowrap}
.b-dihubungi{background:#FFF4E5;color:#c2691b}
.b-booking{background:#EEF0FF;color:#5b4bd6}
.b-lunas{background:#E6Faf5;color:#0f9d7a}
.b-selesai{background:#F3E8FF;color:#7c3aed}
.vendor-money{display:flex;justify-content:space-between;font-size:13px;font-weight:600;color:var(--ink-soft);padding:10px 0;border-top:1px dashed var(--line);border-bottom:1px dashed var(--line)}
.vendor-money b{color:var(--ink);display:block;font-size:15px;font-variant-numeric:tabular-nums}
.vendor-note{font-size:13px;color:var(--ink-soft)}
.vendor-actions{display:flex;gap:8px;margin-top:2px}
.va{flex:1;padding:9px;border-radius:10px;font-weight:700;font-size:13px;text-align:center;background:#FBF3F7;color:var(--ink);transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;text-decoration:none}
.va:hover{background:#FFE7EF}
.va.wa{background:#E6F8EF;color:#0f9d7a}.va.wa:hover{background:#CFF3E0}
.va.del{flex:0 0 auto;width:42px;color:#e11d48;background:#FFF1F3}

/* checklist */
.phase{margin-bottom:14px}
.phase-head{display:flex;align-items:center;gap:12px;margin-bottom:12px}
.phase-tag{font-family:var(--font-d);font-weight:600;font-size:13px;color:#fff;padding:5px 12px;border-radius:999px;background:var(--ink);white-space:nowrap}
.phase-head .pbar{flex:1}
.phase-head .pcount{font-weight:800;font-size:13px;color:var(--ink-soft);font-variant-numeric:tabular-nums}
.task{display:flex;align-items:center;gap:13px;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;margin-bottom:8px;transition:.15s}
.task:hover{border-color:#F0C8D8}
.task.done{background:#FAFBF7;border-color:#E8F0DD}
.tick{width:24px;height:24px;border-radius:8px;border:2px solid #E3C8D4;flex:0 0 auto;display:grid;place-items:center;color:#fff;font-size:14px;transition:.15s}
.task.done .tick{background:var(--mint);border-color:var(--mint)}
.task .txt{flex:1;font-weight:600;font-size:14.5px}
.task.done .txt{text-decoration:line-through;color:var(--ink-soft);text-decoration-color:var(--mint)}
.task-del{opacity:0;width:28px;height:28px;border-radius:8px;display:grid;place-items:center;color:var(--ink-soft);transition:.15s}
.task:hover .task-del{opacity:1}
.task-del:hover{background:#FFF1F3;color:#e11d48}
.addtask{display:flex;gap:8px;margin-top:4px}
.addtask input{flex:1;border:1.5px dashed #E3C8D4;background:transparent;border-radius:var(--r-sm);padding:11px 14px;font-weight:600;outline:none}
.addtask input:focus{border-color:var(--rose);border-style:solid;background:#fff}
.addtask button{padding:0 16px;border-radius:var(--r-sm);background:var(--rose);color:#fff;font-weight:800;font-size:18px}

/* guests */
.guest-row{display:grid;grid-template-columns:1fr auto auto auto;gap:12px;align-items:center;padding:14px 16px;border:1px solid var(--line);border-radius:var(--r-sm);background:#fff;margin-bottom:8px}
.guest-row .gname{font-weight:700;font-size:15px}
.guest-row .gname small{display:block;font-weight:600;color:var(--ink-soft);font-size:12px}
.guest-row .gcount{font-weight:800;font-variant-numeric:tabular-nums;font-size:15px}
.guest-row .gcount small{color:var(--ink-soft);font-weight:600;font-size:11px}
.rsvp{padding:5px 11px;border-radius:999px;font-size:11.5px;font-weight:800}
.r-diundang{background:#F1F0F4;color:#6b6580}
.r-hadir{background:#E6Faf5;color:#0f9d7a}
.r-tidak{background:#FFF1F3;color:#be123c}
.r-pending{background:#FFF4E5;color:#c2691b}
.guest-edit{display:flex;gap:6px}
.gbtn{width:34px;height:34px;border-radius:9px;display:grid;place-items:center;background:#FBF3F7;color:var(--ink-soft);transition:.15s}
.gbtn:hover{background:#FFE7EF;color:var(--ink)}
.gbtn.del:hover{background:#FFF1F3;color:#e11d48}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;border-radius:13px;font-weight:800;font-size:14px;transition:.18s}
.btn-pri{background:var(--grad);color:#fff;box-shadow:var(--sh-2)}
.btn-pri:hover{transform:translateY(-2px)}
.btn-ghost{background:#fff;border:1px solid var(--line);box-shadow:var(--sh-1)}
.btn-ghost:hover{transform:translateY(-2px)}
.btn-danger{background:#FFF1F3;color:#e11d48;border:1px solid #FFD7DE}
.btn-block{width:100%;justify-content:center}

/* empty */
.empty{text-align:center;padding:48px 20px}
.empty .em{font-size:46px;margin-bottom:10px}
.empty h3{font-family:var(--font-d);font-weight:600;font-size:20px;margin-bottom:6px}
.empty p{color:var(--ink-soft);font-size:14px;margin-bottom:18px}

/* checklist progress card (dashboard) */
.next-list{display:flex;flex-direction:column;gap:9px;margin-top:14px}
.next-item{display:flex;align-items:center;gap:10px;font-size:13.5px;font-weight:600}
.next-item .o{width:18px;height:18px;border-radius:6px;border:2px solid #E3C8D4;flex:0 0 auto}
.ring-row{display:flex;align-items:center;gap:18px}
.mini-ring{position:relative;width:84px;height:84px;flex:0 0 auto}
.mini-ring .mc{position:absolute;inset:0;display:grid;place-items:center;font-family:var(--font-d);font-weight:600;font-size:20px}

.vstatus{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:6px}
.vstat-pill{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;border-radius:12px;font-weight:700;font-size:13px}

/* ---------- MODAL ---------- */
.overlay{position:fixed;inset:0;z-index:60;background:rgba(67,35,58,.42);backdrop-filter:blur(3px);display:none;align-items:flex-end;justify-content:center;padding:0}
.overlay.is-open{display:flex}
@media(min-width:640px){.overlay{align-items:center;padding:20px}}
.modal{
  width:100%;max-width:520px;max-height:92vh;overflow-y:auto;
  background:var(--cream);border-radius:24px 24px 0 0;
  box-shadow:0 -20px 60px rgba(67,35,58,.3);
  animation:slideUp .3s cubic-bezier(.34,1.3,.64,1);
}
@media(min-width:640px){.modal{border-radius:24px;animation:pop .25s cubic-bezier(.34,1.3,.64,1)}}
@keyframes slideUp{from{transform:translateY(40px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes pop{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
.modal-head{position:sticky;top:0;background:var(--cream);display:flex;align-items:center;justify-content:space-between;padding:22px 24px 14px;z-index:2}
.modal-head h3{font-family:var(--font-d);font-weight:600;font-size:22px}
.modal-x{width:36px;height:36px;border-radius:11px;display:grid;place-items:center;background:#fff;border:1px solid var(--line);font-size:18px}
.modal-body{padding:4px 24px 24px}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:6px;text-transform:uppercase;letter-spacing:.3px}
.mfield input,.mfield select,.mfield textarea{
  width:100%;padding:13px 15px;border-radius:13px;border:1.5px solid var(--line);background:#fff;outline:none;transition:.15s;font-weight:600;
}
.mfield textarea{resize:vertical;min-height:70px;font-weight:500}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(255,77,141,.12)}
.pass-wrap{position:relative}
.pass-wrap input{padding-right:46px!important}
.pass-eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:transparent;border:0;cursor:pointer;font-size:17px;line-height:1;padding:6px;opacity:.55;transition:opacity .15s;border-radius:8px}
.pass-eye:hover{opacity:.9}
.pass-eye.on{opacity:1}
.mrow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.mfield .money-in{background:#fff;border-radius:13px;padding:13px 15px}
.modal-foot{display:flex;gap:10px;margin-top:8px}
.settings-divider{height:1px;background:var(--line);margin:20px 0}
.danger-zone{font-size:12px;font-weight:700;color:#be123c;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}

/* toast */
.toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fff;padding:13px 22px;border-radius:999px;
  font-weight:700;font-size:14px;box-shadow:0 14px 40px rgba(67,35,58,.4);
  opacity:0;pointer-events:none;transition:.3s;z-index:80;display:flex;align-items:center;gap:9px;
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* confetti */
.confetti-layer{position:fixed;inset:0;pointer-events:none;z-index:70;overflow:hidden}

/* ---------- personalisasi (FAB + panel) ---------- */
.fab{display:none;position:fixed;right:18px;bottom:18px;z-index:60;width:54px;height:54px;border-radius:50%;background:var(--grad);color:#fff;font-size:22px;place-items:center;box-shadow:0 10px 26px rgba(255,77,141,.4);transition:transform .18s,box-shadow .2s}
body.is-app:not(.admin-mode) .fab{display:grid}
.fab:hover{transform:translateY(-3px) scale(1.05)}
.fab:active{transform:scale(.95)}
.persona{position:fixed;right:18px;bottom:84px;z-index:61;width:300px;max-width:calc(100vw - 36px);background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 22px 54px rgba(67,35,58,.24);padding:16px;opacity:0;transform:translateY(12px) scale(.96);pointer-events:none;transition:.22s;transform-origin:bottom right}
.persona.open{opacity:1;transform:none;pointer-events:auto}
body.admin-mode .fab,body.admin-mode .persona{display:none!important}
.persona-h{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.persona-h b{font-family:var(--font-d);font-size:16px;color:var(--ink)}
.persona-x{width:26px;height:26px;border-radius:50%;background:rgba(67,35,58,.07);color:var(--ink);font-size:12px;display:grid;place-items:center}
.persona-sec+.persona-sec{margin-top:16px;padding-top:14px;border-top:1px solid var(--line)}
.persona-lbl{font-size:11.5px;font-weight:700;text-transform:uppercase;letter-spacing:.4px;color:var(--ink-soft);margin-bottom:9px}
.sw-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.sw{height:48px;border-radius:13px;position:relative;border:2px solid transparent;box-shadow:var(--sh-1);overflow:hidden;transition:transform .15s}
.sw:hover{transform:translateY(-2px)}
.sw.on{border-color:var(--ink)}
.sw-lbl{position:absolute;left:0;right:0;bottom:0;font-size:9px;font-weight:800;color:#fff;background:rgba(0,0,0,.24);padding:2px 0;text-align:center;letter-spacing:.2px}
.sw.on .sw-lbl{padding-bottom:1px}
.sw.on::after{content:"✓";position:absolute;top:5px;right:6px;color:#fff;font-weight:800;font-size:13px;text-shadow:0 1px 3px rgba(0,0,0,.35)}
.mus-ctl{display:flex;align-items:center;gap:11px}
.mus-play{padding:9px 15px;border-radius:11px;background:var(--grad);color:#fff;font-weight:800;font-size:13px;white-space:nowrap;box-shadow:var(--sh-1)}
.mus-vol{flex:1;min-width:0;accent-color:var(--rose)}
.persona-note{font-size:11px;color:var(--ink-soft);line-height:1.45;margin-top:11px}
@media(max-width:560px){.fab{right:14px;bottom:14px}.persona{right:14px;bottom:78px}}
/* ===== Lapor / Masukan (pojok kiri bawah) ===== */
.fab-fb{display:none;position:fixed;left:18px;bottom:18px;z-index:60;width:50px;height:50px;border-radius:50%;background:#fff;border:1.5px solid var(--line);color:var(--ink);font-size:21px;place-items:center;box-shadow:0 10px 26px rgba(67,35,58,.18);transition:transform .18s,box-shadow .2s}
body.is-app:not(.admin-mode) .fab-fb{display:grid}
.fab-fb:hover{transform:translateY(-3px) scale(1.05)}
.fab-fb:active{transform:scale(.95)}
.fbpanel{position:fixed;left:18px;bottom:78px;z-index:61;width:320px;max-width:calc(100vw - 36px);background:var(--card);border:1px solid var(--line);border-radius:20px;box-shadow:0 22px 54px rgba(67,35,58,.24);padding:16px;opacity:0;transform:translateY(12px) scale(.96);pointer-events:none;transition:.22s;transform-origin:bottom left}
.fbpanel.open{opacity:1;transform:none;pointer-events:auto}
body:not(.is-app) .fbpanel,body.admin-mode .fbpanel{display:none!important}
.fb-types{display:flex;gap:8px;margin-bottom:10px}
.fb-type{flex:1;padding:9px 6px;border:1.5px solid var(--line);border-radius:12px;background:#fff;font-weight:700;font-size:12.5px;color:var(--ink-soft);cursor:pointer;transition:.15s}
.fb-type.on{border-color:var(--rose);background:var(--glow1);color:var(--ink)}
.fb-area{width:100%;min-height:96px;resize:vertical;padding:11px 13px;border:1.5px solid var(--line);border-radius:13px;background:#fff;outline:none;font-weight:500;font-family:var(--font-b);font-size:14px;color:var(--ink)}
.fb-area:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(255,77,141,.12)}
@media(max-width:560px){.fab-fb{left:14px;bottom:14px}.fbpanel{left:14px;bottom:72px}}
/* daftar laporan di konsol admin */
.fb-item{border:1px solid var(--line);border-radius:14px;padding:12px 14px;margin-bottom:10px;background:#fff}
.fb-item.fb-done{opacity:.6}
.fb-item-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:7px}
.fb-meta{font-size:11.5px;color:var(--ink-soft);font-weight:600}
.fb-msg{font-size:13.5px;line-height:1.5;color:var(--ink);white-space:pre-wrap;word-break:break-word;margin-bottom:10px}
.fb-acts{display:flex;gap:8px;flex-wrap:wrap}
/* ===== Undangan publik (halaman tamu) ===== */
#invite{display:none}
body.pubinv{background:var(--cream)}
body.pubinv #boot,body.pubinv .topbar,body.pubinv #localBanner,body.pubinv #announceBar,body.pubinv #hero,body.pubinv .tabs,body.pubinv #view,body.pubinv #appFoot,body.pubinv .fab,body.pubinv .fab-fb,body.pubinv #auth,body.pubinv #adminApp{display:none!important}
body.pubinv #invite{display:block}
.inv{max-width:560px;margin:0 auto;background:#fff;min-height:100vh;overflow:hidden;box-shadow:0 0 60px rgba(67,35,58,.12)}
.inv-loading{min-height:100vh;display:grid;place-items:center;text-align:center;padding:30px;color:var(--ink-soft);font-weight:600;font-size:16px}
.inv-cover{position:relative;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;color:#fff;padding:40px 26px;overflow:hidden}
.inv-cover .bgimg{position:absolute;inset:0;background-size:cover;background-position:center}
.inv-cover .veil{position:absolute;inset:0;background:linear-gradient(180deg,rgba(67,35,58,.30),rgba(67,35,58,.55) 60%,rgba(67,35,58,.80))}
.inv-cover.nogphoto{background:linear-gradient(160deg,var(--rose),var(--coral) 55%,var(--gold))}
.inv-cover>*{position:relative;z-index:2}
.inv-eyebrow{font-size:12px;letter-spacing:4px;text-transform:uppercase;font-weight:700;opacity:.9;margin-bottom:16px}
.inv-names{font-family:var(--font-d);font-weight:600;font-size:46px;line-height:1.08;margin:4px 0;text-shadow:0 2px 18px rgba(0,0,0,.25)}
.inv-amp{display:block;font-style:italic;font-weight:400;font-size:26px;opacity:.92;margin:4px 0}
.inv-date{font-size:16px;font-weight:600;opacity:.95;margin-top:8px}
.inv-cd{display:flex;gap:9px;justify-content:center;margin-top:26px}
.inv-cd>div{background:rgba(255,255,255,.16);border:1px solid rgba(255,255,255,.32);border-radius:14px;padding:10px 6px;min-width:60px}
.inv-cd b{display:block;font-family:var(--font-d);font-size:26px;font-weight:600;line-height:1;font-variant-numeric:tabular-nums}
.inv-cd span{font-size:10px;text-transform:uppercase;letter-spacing:1px;opacity:.85}
.inv-scroll{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:26px;z-index:2;color:#fff;animation:invbob 1.6s ease-in-out infinite}
@keyframes invbob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}
.inv-sec{padding:46px 26px;text-align:center;border-bottom:1px solid var(--line)}
.inv-sec h3{font-family:var(--font-d);font-weight:600;font-size:24px;color:var(--ink);margin:0 0 6px}
.inv-sec .ic{font-size:26px;display:block;margin-bottom:8px}
.inv-quote{font-family:var(--font-d);font-style:italic;font-size:19px;line-height:1.6;color:var(--ink);max-width:440px;margin:0 auto}
.inv-greet{font-size:15px;line-height:1.7;color:var(--ink-soft);max-width:440px;margin:8px auto 0}
.inv-evt{background:var(--glow1);border:1px solid var(--line);border-radius:20px;padding:22px 20px;max-width:420px;margin:16px auto 0}
.inv-evt h4{font-family:var(--font-d);font-weight:600;font-size:21px;color:var(--rose);margin:0 0 10px}
.inv-evt .row{font-size:15px;color:var(--ink);margin:5px 0;font-weight:600}
.inv-evt .row small{display:block;color:var(--ink-soft);font-weight:500;font-size:13px;margin-top:2px}
.inv-map{display:inline-flex;align-items:center;gap:6px;margin-top:14px;background:var(--rose);color:#fff;padding:10px 18px;border-radius:999px;font-weight:700;font-size:13px;text-decoration:none}
.inv-field{max-width:420px;margin:0 auto;text-align:left}
.inv-field label{display:block;font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.3px;margin:12px 0 6px}
.inv-field input,.inv-field textarea{width:100%;padding:12px 14px;border:1.5px solid var(--line);border-radius:12px;background:#fff;outline:none;font-weight:600;font-family:var(--font-b);font-size:14px;color:var(--ink)}
.inv-field textarea{min-height:88px;resize:vertical;font-weight:500}
.inv-field input:focus,.inv-field textarea:focus{border-color:var(--rose);box-shadow:0 0 0 3px rgba(255,77,141,.12)}
.inv-rsvp-opts{display:flex;gap:8px}
.inv-rsvp-opts button{flex:1;padding:11px;border:1.5px solid var(--line);border-radius:12px;background:#fff;font-weight:700;font-size:13px;color:var(--ink-soft);cursor:pointer}
.inv-rsvp-opts button.on{border-color:var(--rose);background:var(--glow1);color:var(--ink)}
.inv-btn{width:100%;margin-top:16px;padding:14px;border:none;border-radius:14px;background:linear-gradient(135deg,var(--rose),var(--coral) 55%,var(--gold));color:#fff;font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 10px 26px rgba(255,77,141,.3)}
.inv-btn:disabled{opacity:.65}
.inv-wishes{max-width:440px;margin:22px auto 0;text-align:left;max-height:330px;overflow:auto}
.inv-wish{background:var(--glow1);border:1px solid var(--line);border-radius:14px;padding:12px 15px;margin-bottom:10px}
.inv-wish b{font-size:13.5px;color:var(--ink)}
.inv-wish p{margin:4px 0 0;font-size:13.5px;color:var(--ink-soft);line-height:1.5;white-space:pre-wrap;word-break:break-word}
.inv-gift{background:var(--glow2);border:1px solid var(--line);border-radius:18px;padding:22px;max-width:420px;margin:14px auto 0}
.inv-gift .bank{font-family:var(--font-d);font-size:20px;color:var(--ink);font-weight:600}
.inv-gift .rek{font-size:22px;font-weight:800;letter-spacing:1px;color:var(--rose);font-variant-numeric:tabular-nums;margin:6px 0}
.inv-gift .nm{font-size:13px;color:var(--ink-soft);font-weight:600}
.inv-copy{margin-top:12px;background:var(--ink);color:#fff;border:none;padding:9px 16px;border-radius:999px;font-weight:700;font-size:12.5px;cursor:pointer}
.inv-foot{padding:40px 26px;text-align:center;background:var(--ink);color:#fff}
.inv-foot .fn{font-family:var(--font-d);font-size:24px;font-weight:600;margin-bottom:6px}
.inv-foot small{opacity:.7;font-size:12px}
.inv-music{position:fixed;bottom:18px;right:18px;z-index:80;width:50px;height:50px;border-radius:50%;background:var(--rose);color:#fff;border:none;font-size:20px;box-shadow:0 8px 22px rgba(255,77,141,.4);cursor:pointer;display:grid;place-items:center}
.inv-music.spin-anim{animation:invspin 4s linear infinite}
@keyframes invspin{to{transform:rotate(360deg)}}
/* editor undangan: link & respon */
.iv-link{display:flex;gap:8px;align-items:center;background:var(--glow1);border:1px solid var(--line);border-radius:12px;padding:10px 12px;font-size:12.5px;word-break:break-all;font-weight:600;color:var(--ink)}
.iv-resp{border:1px solid var(--line);border-radius:14px;padding:11px 14px;margin-bottom:9px;background:#fff;text-align:left}
.iv-resp .nm{font-weight:700;font-size:13.5px;color:var(--ink)}
.iv-resp .meta{font-size:11.5px;color:var(--ink-soft);font-weight:500}
.iv-resp p{margin:5px 0 0;font-size:13px;color:var(--ink-soft);line-height:1.5;white-space:pre-wrap;word-break:break-word}
/* ===== Undangan: efek premium (opening, parallax 3D, kelopak, reveal) ===== */
body.pubinv{overflow:hidden}
body.pubinv.inv-opened{overflow:auto}
.inv-cover{perspective:1000px}
.inv-bg{position:absolute;inset:-9%;background-size:cover;background-position:center;z-index:0}
.inv-cover .veil{z-index:1}
.inv-cover-in{position:relative;z-index:3}
.inv-scroll{z-index:3}
.prx{transition:transform .15s ease-out;will-change:transform}
/* kelopak berjatuhan */
.inv-petals{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:2}
.inv-petal{position:absolute;top:0;pointer-events:none;opacity:.78;animation:invfall linear infinite;will-change:transform}
@keyframes invfall{0%{transform:translateY(-12vh) translateX(0) rotate(0)}100%{transform:translateY(114vh) translateX(34px) rotate(250deg)}}
/* reveal saat scroll (efek bangkit 3D) */
.inv-sec.reveal{opacity:0;transform:translateY(46px) rotateX(10deg);transform-origin:center top;transition:opacity .7s ease,transform .85s cubic-bezier(.2,.7,.2,1)}
.inv-sec.reveal.in{opacity:1;transform:none}
/* ornamen floral */
.inv-orn-wrap{color:var(--rose);width:158px;max-width:66%;margin:0 auto 16px}
.inv-orn-wrap.light{color:rgba(255,255,255,.72)}

.inv-open-orn{margin:10px auto 4px;width:fit-content;animation:invfloat 3s ease-in-out infinite;filter:drop-shadow(0 6px 16px rgba(0,0,0,.34))}

/* ===== Adat: bingkai sampul penuh (krem + teks gelap + border batik) ===== */
.inv-cover.adat,.inv-open.adat{background:linear-gradient(180deg,var(--cream),var(--glow1));color:var(--ink);padding-top:78px;padding-bottom:96px}

.inv-cover.adat .inv-date,.inv-open.adat .inv-open-to{color:var(--ink-soft)}

.inv-open.adat .inv-open-btn{background:var(--ink);color:var(--cream);box-shadow:0 12px 28px -8px rgba(0,0,0,.45)}
.inv-band-top,.inv-band-bot{position:absolute;left:0;right:0;z-index:3;pointer-events:none;line-height:0}

.inv-band-bot{bottom:0}

.inv-sil-r{right:4px;transform:scaleX(-1)}
.inv-cloud{position:absolute;z-index:2;width:90px;top:15%;pointer-events:none;opacity:.92}
.inv-cloud svg{width:100%;height:auto;display:block}
.inv-cloud-l{left:-8px}
.inv-cloud-r{right:-8px;transform:scaleX(-1)}
.inv-photo-wrap{position:relative;width:198px;max-width:60%;margin:0 auto 20px}
.inv-open.adat .inv-photo-wrap{width:150px}
.inv-photo{aspect-ratio:3/4;border-radius:99px 99px 16px 16px;background-size:cover;background-position:center;border:3px solid var(--gold);box-shadow:0 18px 38px -14px rgba(0,0,0,.5);position:relative;z-index:2}
.inv-photo.nophoto{display:flex;align-items:center;justify-content:center;font-size:54px;background:var(--glow1)}

/* ===== Opsi B: nuansa adat di seluruh isi undangan ===== */

body.inv-adat .inv-evt h4{color:var(--ink)}
body.inv-adat .inv-evt .row{color:var(--ink)}
body.inv-adat .inv-gift .rek{color:var(--ink)}

/* kartu acara: kedalaman + ikon */

<script>
/* ============================================================

const KEY = 'wedding:data';
const APP_NAME = 'NaikPelaminan';
const VCATS = ['Gedung','Katering','Dekorasi','Foto & Video','MUA','Busana','WO','Hiburan','Undangan','Souvenir','Cincin','Transportasi'];

const INVITE_TYPE = {fisik:'Undangan Fisik',digital:'Undangan Digital'};
function guestSide(g){ if(g.side) return g.side; const t=g.group||''; if(/wanita/i.test(t)) return 'wanita'; if(/pria/i.test(t)) return 'pria'; return ''; }
function vendorCats(v){ if(v && Array.isArray(v.cats) && v.cats.length) return v.cats.slice(); if(v && v.category) return String(v.category).split(',').map(s=>s.trim()).filter(Boolean); return []; }
// ====== MUSIK LATAR (1 lagu) ======

function secQOptions(sel){ return SEC_QUESTIONS.map(q=>`<option value="${esc(q)}"${sel===q?' selected':''}>${esc(q)}</option>`).join(''); }
// nama pengguna → identitas internal; bila input sudah berupa email (akun lama) dipakai apa adanya
function toAuthEmail(input){

const PALETTE = ['#FF4D8D','#FF7A59','#FFC83D','#2DD4BF','#8B5CF6'];
const reducedMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,7);
const grp = n => new Intl.NumberFormat('id-ID').format(Math.round(n||0));

const $   = s => document.querySelector(s);

/* ---------- default data ---------- */
function defaultDate(){
  const d = new Date(); d.setDate(d.getDate()+180);
  return d.toISOString().slice(0,10);
}
function defaultData(){
  const cats = [
    'Gedung / Venue','Katering','Dekorasi & Pelaminan','Foto & Video',
    'MUA & Busana','Wedding Organizer','Hiburan (Band/MC/Sound)','Undangan & Souvenir',
    'Cincin','Mahar & Seserahan','Dokumen KUA / Sipil','Lain-lain'
  ].map((name,i)=>({id:uid(),name,color:PALETTE[i%PALETTE.length],estimate:0,actual:0,paid:0}));

  const phases = [
    ['12+ bulan',['Tentukan tanggal & total anggaran','Susun daftar tamu awal','Survei & booking gedung']],
    ['9–12 bulan',['Booking katering','Pilih Wedding Organizer','Tentukan tema & konsep acara']],
    ['6–9 bulan',['Booking fotografer & videografer','Booking MUA & busana','Booking hiburan / band / MC']],
    ['4–6 bulan',['Desain undangan & souvenir','Urus dokumen KUA / Catatan Sipil','Fitting baju pertama']],
    ['2–3 bulan',['Sebar undangan','Finalisasi menu katering','Siapkan mahar & seserahan']],
    ['1 bulan',['Konfirmasi semua vendor','Fitting akhir & gladi resik','Susun rundown acara']],
    ['Minggu H',['Konfirmasi RSVP tamu','Siapkan amplop & angpao box','Perawatan diri & istirahat cukup']],
    ['Hari H',['Bawa dokumen penting','Koordinasi dengan WO','Nikmati momen bahagia 💍']],
  ];
  const checklist=[];
  phases.forEach(([phase,items])=>items.forEach(text=>checklist.push({id:uid(),phase,text,done:false})));

  return {
    settings:{ partner1:'Mempelai', partner2:'Pasangan', date:defaultDate(), totalBudget:0, photo:'', photoPath:'' },
    budget:cats, vendors:[], checklist,
    guests:[], seserahan:[], moodboard:[], activeTab:'dashboard',
    invite:{ on:false, slug:'', theme:'minimalis', greeting:'', quote:'', akad:{date:'',time:'',place:'',map:''}, resepsi:{date:'',time:'',place:'',map:''}, gift:{bank:'',rek:'',name:'',ewallet:'',note:''} }
  };
}

let state = defaultData();
const PHASE_ORDER = ['12+ bulan','9–12 bulan','6–9 bulan','4–6 bulan','2–3 bulan','1 bulan','Minggu H','Hari H'];

/* ============================================================
   KONFIGURASI SUPABASE  —  sudah terisi, tidak perlu diubah
============================================================ */
const SUPABASE_URL      = 'https://mxszmayrvxltryzolwug.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_hbIzZ8apMrORui6Td2pIdg_M6yynRa1';

const CLOUD_ENABLED = SUPABASE_URL.startsWith('https://')
  && !SUPABASE_URL.includes('YOUR-PROJECT')
  && SUPABASE_ANON_KEY.length > 40
  && !SUPABASE_ANON_KEY.includes('YOUR');

let sb=null, currentUser=null, lastWriteISO=null, rtChannel=null, welcomed=false;
let activeWeddingId=null, isWeddingOwner=true, myShareCode=null, partnerOwnerEmail='';
let userStatus='approved', isAdmin=false;
let adminUsers=[], announceDismissed=false;

/* ---------- indikator sinkronisasi ---------- */
function setSync(status){
  const c=$('#syncChip'); if(!c) return;
  c.className='icon-btn '+({saved:'s-saved',saving:'s-saving',error:'s-error',local:'s-local'}[status]||'s-local');
  c.textContent=({saved:'☁️',saving:'⏳',error:'⚠️',local:'💾'}[status]||'💾');
  c.title=({saved:'Tersinkron ke cloud',saving:'Menyimpan…',error:'Gagal menyimpan — coba lagi',local:'Mode lokal (Supabase belum diatur)'}[status]||'');
}

/* ---------- fallback lokal (saat Supabase belum diatur) ---------- */
async function localGet(){ try{ if(!window.storage) return null; const r=await window.storage.get(KEY); return r?r.value:null; }catch(e){ return null; } }
async function localSet(v){ try{ if(!window.storage) return; await window.storage.set(KEY,v); }catch(e){} }

/* ---------- save (otomatis dialihkan ke cloud / lokal) ---------- */
let saveTimer=null;
function save(){
  clearTimeout(saveTimer);
  if(CLOUD_ENABLED && currentUser){
    setSync('saving');
    saveTimer=setTimeout(cloudSave,600);
  }else{
    saveTimer=setTimeout(()=>localSet(JSON.stringify(state)),350);
  }
}
/* ---------- tentukan pernikahan yang sedang dikelola ---------- */
async function resolveActiveWedding(){
  try{
    const {data}=await sb.from('wedding_members').select('owner_id,owner_email').eq('member_id',currentUser.id).limit(1).maybeSingle();
    if(data && data.owner_id){ activeWeddingId=data.owner_id; isWeddingOwner=false; partnerOwnerEmail=data.owner_email||''; return; }
  }catch(e){ console.error(e); }
  activeWeddingId=currentUser.id; isWeddingOwner=true; partnerOwnerEmail='';
}
async function cloudSave(){
  const iso=new Date().toISOString();
  const {error}=await sb.from('weddings').update({data:state,updated_at:iso}).eq('user_id',activeWeddingId);
  if(error){ setSync('error'); console.error('Gagal menyimpan:',error); }
  else { lastWriteISO=iso; setSync('saved'); }
}
async function cloudCreate(){
  const iso=new Date().toISOString();
  const {error}=await sb.from('weddings').insert({user_id:currentUser.id,data:state,updated_at:iso});
  if(error){ setSync('error'); console.error('Gagal membuat:',error); } else { lastWriteISO=iso; setSync('saved'); }
}
async function cloudLoad(){
  const {data:row,error}=await sb.from('weddings').select('data,updated_at').eq('user_id',activeWeddingId).maybeSingle();
  if(error) console.error('Gagal memuat:',error);
  if(row && row.data && Object.keys(row.data).length){
    state=Object.assign(defaultData(),row.data);
    lastWriteISO=row.updated_at;
    myShareCode = null;            // diambil lazy via get_share_code saat dibutuhkan
  }else if(isWeddingOwner){
    state=defaultData();
    await cloudCreate();           // buat baris awal untuk pemilik
  }else{
    state=defaultData();           // anggota tetapi baris pemilik kosong
  }
}
function subscribeRealtime(){
  if(rtChannel) sb.removeChannel(rtChannel);
  rtChannel=sb.channel('wedding-'+activeWeddingId)
    .on('postgres_changes',{event:'*',schema:'public',table:'weddings',filter:'user_id=eq.'+activeWeddingId},payload=>{
      const row=payload.new; if(!row||!row.data) return;
      if(row.updated_at===lastWriteISO) return;                 // abaikan gema dari perangkat ini
      if($('#overlay').classList.contains('is-open')) return;   // jangan ganggu saat form terbuka
      const ae=document.activeElement;
      if(ae && (ae.matches('input,textarea,select')||ae.isContentEditable)) return; // jangan ganggu saat mengetik
      state=Object.assign(defaultData(),row.data);
      lastWriteISO=row.updated_at;
      renderHero(); renderTabs(); renderView();
      toast('Diperbarui dari pasangan/perangkat lain ☁️');
    }).subscribe();
}

/* ---------- totals ---------- */
function budgetTotals(){
  const est=state.budget.reduce((s,c)=>s+(+c.estimate||0),0);
  const act=state.budget.reduce((s,c)=>s+(+c.actual||0),0);
  const paid=state.budget.reduce((s,c)=>s+(+c.paid||0),0);
  const budget=+state.settings.totalBudget||0;
  return {est,act,paid,budget,sisa:budget-paid};
}
function guestTotals(){
  let total=0,hadir=0,undangan=state.guests.length;
  let sideW=0,sideP=0,invFisik=0,invDigital=0;
  state.guests.forEach(g=>{
    const c=(+g.count||0); total+=c; if(g.rsvp==='hadir') hadir+=c;
    const sd=guestSide(g); if(sd==='wanita') sideW+=c; else if(sd==='pria') sideP+=c;
    if(g.invite==='fisik') invFisik++; else if(g.invite==='digital') invDigital++;
  });
  return {total,hadir,undangan,sideW,sideP,invFisik,invDigital};
}
function vendorTotals(){
  let nilai=0,paid=0;
  state.vendors.forEach(v=>{ nilai+=(+v.price||0); paid+=(+v.paid||0); });
  return {count:state.vendors.length,nilai,paid,sisa:nilai-paid};
}
function checklistTotals(){
  const total=state.checklist.length;
  const done=state.checklist.filter(t=>t.done).length;
  return {total,done,pct: total? Math.round(done/total*100):0};
}

/* ============================================================ RENDER: HERO ============================================================ */
function renderHero(){

  const p1=esc(s.partner1||'Mempelai'), p2=esc(s.partner2||'Pasangan');

    <h1 class="hero-names" data-act="open-settings" title="Klik untuk ubah nama">${p1}<span class="amp">&amp;</span>${p2}</h1>
    <div class="hero-date" data-act="open-settings" title="Klik untuk ubah tanggal">
      📅 <span>${formatDateID(s.date)}</span> <span class="edit-hint">ubah</span>

    <div id="countdown"></div>
  `;
  const ph=s.photo;
  $('#hero').style.background = ph

    : '';
  if(!reducedMotion) spawnPetals();
  renderCountdown();
}
function spawnPetals(){
  const hero=$('#hero'); hero.querySelectorAll('.petal').forEach(p=>p.remove());
  const chars=['🌸','💮','🌷','✨','💕','🌹'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span'); s.className='petal';
    s.textContent=chars[i%chars.length];
    s.style.left=Math.random()*100+'%';
    s.style.fontSize=(13+Math.random()*14)+'px';
    s.style.animationDuration=(7+Math.random()*8)+'s';
    s.style.animationDelay=(-Math.random()*10)+'s';
    hero.appendChild(s);
  }
}
let cdTimer=null;
function renderCountdown(){
  clearInterval(cdTimer);
  const el=$('#countdown'); if(!el) return;
  const tick=()=>{
    const target=new Date(state.settings.date+'T00:00:00').getTime();
    const diff=target-Date.now();
    if(diff<=0){
      const past=Math.abs(Math.floor(diff/86400000));
      el.innerHTML=`<div class="hero-done">🎉 Hari bahagia telah tiba! ${past>0?`(${past} hari yang lalu)`:''}</div>`;
      $('#chip-days').textContent='🎉';
      clearInterval(cdTimer); return;
    }
    const d=Math.floor(diff/86400000);
    const h=Math.floor(diff%86400000/3600000);
    const m=Math.floor(diff%3600000/60000);
    const sec=Math.floor(diff%60000/1000);
    el.className='countdown';
    el.innerHTML=[['Hari',d],['Jam',h],['Menit',m],['Detik',sec]]
      .map(([l,v])=>`<div class="cd-block"><div class="cd-num">${String(v).padStart(2,'0')}</div><div class="cd-lbl">${l}</div></div>`).join('');
    $('#chip-days').textContent=d;
  };
  tick(); cdTimer=setInterval(tick,1000);
}

/* ============================================================ RENDER: TABS ============================================================ */
const TABS=[['dashboard','📊','Ringkasan'],['budget','💰','Anggaran'],['vendor','🤝','Vendor'],['checklist','✅','Checklist'],['guests','💌','Tamu'],['seserahan','🎁','Seserahan'],['moodboard','🎨','Inspirasi']];

}

/* ---------- donut svg ---------- */
function donutSVG(segments,centerTop,centerNum){
  const total=segments.reduce((s,x)=>s+x.value,0);
  const r=70,c=2*Math.PI*r;
  let off=0,circles='';
  if(total>0){
    segments.filter(s=>s.value>0).forEach(s=>{
      const len=s.value/total*c;
      circles+=`<circle cx="100" cy="100" r="${r}" fill="none" stroke="${s.color}" stroke-width="28"
        stroke-dasharray="${len} ${c-len}" stroke-dashoffset="${-off}" transform="rotate(-90 100 100)"/>`;
      off+=len;
    });
  }else{
    circles=`<circle cx="100" cy="100" r="${r}" fill="none" stroke="#F4E6EC" stroke-width="28"/>`;
  }
  return `<div class="donut-wrap">
    <svg viewBox="0 0 200 200" width="200" height="200">${circles}</svg>
    <div class="donut-center"><div class="t">${centerTop}</div><div class="n">${centerNum}</div></div>
  </div>`;
}
function miniRing(pct,color){
  const r=34,c=2*Math.PI*r,len=pct/100*c;
  return `<div class="mini-ring">
    <svg viewBox="0 0 84 84" width="84" height="84">
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="#F4E6EC" stroke-width="9"/>
      <circle cx="42" cy="42" r="${r}" fill="none" stroke="${color}" stroke-width="9" stroke-linecap="round"
        stroke-dasharray="${len} ${c-len}" transform="rotate(-90 42 42)"/>
    </svg><div class="mc" style="color:${color}">${pct}%</div></div>`;
}

/* ============================================================ DASHBOARD ============================================================ */
function renderDashboard(v){
  const b=budgetTotals(), g=guestTotals(), ve=vendorTotals(), cl=checklistTotals();

  // donut data from estimates (alokasi rencana)

    : `<div class="next-item" style="color:#0f9d7a">🎉 Semua tugas selesai! Kamu luar biasa.</div>`;

  // vendor status counts
  const vc={dihubungi:0,booking:0,lunas:0,selesai:0};
  state.vendors.forEach(x=>vc[x.status]!==undefined&&vc[x.status]++);

  v.innerHTML=`
  <div class="grid cols-4">
    ${statCard('rose','💖','Total Anggaran',rp(b.budget),b.budget?'':'Klik ⚙ untuk atur')}
    ${statCard('gold','🧾','Estimasi Biaya',rp(b.est), overBudget?`<span class="up">⚠ Lebih ${rp(b.est-b.budget)}</span>`:(b.budget?`<span class="ok">Sisa ruang ${rp(b.budget-b.est)}</span>`:'') )}
    ${statCard('mint','✅','Sudah Dibayar',rp(b.paid), b.est?`${Math.round(b.paid/b.est*100)||0}% dari estimasi`:'')}
    ${statCard('grape','💌','Jumlah Tamu',grp(g.total)+' org', g.undangan+' undangan')}
  </div>

  <div class="card pad-lg" style="margin-top:16px">
    <div class="section-head" style="margin:0 0 14px"><h2 style="font-size:20px">Progres Anggaran</h2>
      <p>${b.budget?usedPct+'% terbayar':'Atur total anggaran dulu'}</p></div>
    <div class="bar"><span style="width:${usedPct}%;background:var(--grad)"></span></div>
    <div class="progress-meta">
      <span>Dibayar <b>${rp(b.paid)}</b></span>
      <span>Estimasi <b>${rp(b.est)}</b> (${estPct}%)</span>
      <span>Sisa anggaran <b>${rp(b.sisa)}</b></span>
    </div>
    ${overBudget?`<div class="warn">⚠ Estimasi biaya melebihi total anggaran sebesar ${rp(b.est-b.budget)}. Pertimbangkan menyesuaikan beberapa pos.</div>`:''}
  </div>

  <div class="grid cols-2" style="margin-top:16px">
    <div class="card pad-lg">
      <div class="section-head" style="margin:0 0 8px"><h2 style="font-size:20px">Alokasi Anggaran</h2><p>berdasarkan estimasi</p></div>
      <div class="donut-flex">
        ${donutSVG(segs,'Total Estimasi',rp(b.est).replace('Rp ','Rp\u00A0'))}
        <div class="legend">${legend}</div>
      </div>
    </div>

    <div class="card pad-lg">
      <div class="section-head" style="margin:0 0 12px"><h2 style="font-size:20px">Progres Persiapan</h2></div>
      <div class="ring-row">
        ${miniRing(cl.pct,'var(--mint)')}
        <div><div style="font-weight:800;font-size:15px">${cl.done} dari ${cl.total} tugas</div>
        <div style="color:var(--ink-soft);font-size:13px;font-weight:600">selesai dikerjakan</div></div>
      </div>
      <div style="font-size:12px;font-weight:700;color:var(--ink-soft);text-transform:uppercase;letter-spacing:.4px;margin:18px 0 4px">Tugas berikutnya</div>
      <div class="next-list">${nextHTML}</div>
    </div>
  </div>

  <div class="card pad-lg" style="margin-top:16px">
    <div class="section-head" style="margin:0 0 12px"><h2 style="font-size:20px">Status Vendor</h2>
      <p>${ve.count} vendor • tagihan ${rp(ve.sisa)} tersisa</p></div>
    <div class="vstatus">

        <div class="field"><label>Sudah Dibayar</label>

    <div class="grid" style="grid-template-columns:repeat(4,1fr);gap:12px">
      ${miniStat('Total Anggaran',rp(b.budget),'rose','sum-budget')}
      ${miniStat('Total Estimasi',rp(b.est),'gold','sum-est')}
      ${miniStat('Total Aktual',rp(b.act),'coral','sum-act')}
      ${miniStat('Sisa Anggaran',rp(b.sisa),'mint','sum-sisa')}
    </div>
    <div class="bar" style="margin-top:18px"><span id="overall-bar" style="width:${usedPct}%;background:var(--grad)"></span></div>
    <div class="progress-meta"><span id="overall-cap">Aktual ${rp(b.act)} dari anggaran ${rp(b.budget)} (${usedPct}%)</span></div>
    <div id="budget-warn">${overBudget?`<div class="warn">⚠ Estimasi (${rp(b.est)}) melebihi total anggaran (${rp(b.budget)}).</div>`:''}</div>
  </div>

  <div class="section-head" style="margin-top:22px"><div><h2>Pos Pengeluaran</h2><p>Ketik nominal langsung di tiap kolom — tersimpan otomatis</p></div>

function miniStat(lbl,val,c,id){
  return `<div class="card" style="padding:14px 16px;box-shadow:none;border-color:var(--line)">
    <div class="lbl c-${c}" style="font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.3px">${lbl}</div>
    <div class="val c-${c}" style="font-size:19px;margin-top:2px"${id?` id="${id}"`:''}>${val}</div></div>`;
}
function attachBudgetInputs(){
  document.querySelectorAll('.bmoney').forEach(inp=>{
    inp.addEventListener('input',()=>{
      const digits=inp.value.replace(/\D/g,'');
      inp.value=digits?grp(parseInt(digits,10)):'';
      const cat=state.budget.find(c=>c.id===inp.dataset.cat);
      if(!cat) return;
      cat[inp.dataset.f]=digits?parseInt(digits,10):0;
      updateCatBar(cat);
      updateBudgetSummary();
      save();
    });
  });
}
function attachRename(){
  document.querySelectorAll('[data-rename]').forEach(el=>{
    el.addEventListener('blur',()=>{
      const cat=state.budget.find(c=>c.id===el.dataset.rename);
      if(cat){ cat.name=el.textContent.trim()||'Pos'; save(); }
    });
    el.addEventListener('keydown',e=>{ if(e.key==='Enter'){e.preventDefault();el.blur();} });
  });
}
function updateCatBar(cat){
  const ratio=cat.estimate>0?Math.min(100,Math.round(cat.actual/cat.estimate*100)):0;
  const bar=document.querySelector(`[data-cat-bar="${cat.id}"]`);
  const rt=document.querySelector(`[data-ratio-txt="${cat.id}"]`);
  const st=document.querySelector(`[data-sisa-txt="${cat.id}"]`);
  if(bar) bar.style.width=ratio+'%';
  if(rt) rt.textContent=`Aktual ${ratio}% dari estimasi`;
  if(st) st.textContent=(cat.actual>cat.estimate&&cat.estimate>0)?'⚠ over':'';
}
function updateBudgetSummary(){
  const b=budgetTotals();
  const set=(id,val)=>{const e=$('#'+id); if(e) e.textContent=val;};
  set('sum-budget',rp(b.budget)); set('sum-est',rp(b.est)); set('sum-act',rp(b.act)); set('sum-sisa',rp(b.sisa));
  const usedPct=b.budget>0?Math.min(100,Math.round(b.act/b.budget*100)):0;
  const bar=$('#overall-bar'); if(bar) bar.style.width=usedPct+'%';
  const cap=$('#overall-cap'); if(cap) cap.textContent=`Aktual ${rp(b.act)} dari anggaran ${rp(b.budget)} (${usedPct}%)`;
  const warn=$('#budget-warn');
  if(warn) warn.innerHTML=(b.budget>0&&b.est>b.budget)?`<div class="warn">⚠ Estimasi (${rp(b.est)}) melebihi total anggaran (${rp(b.budget)}).</div>`:'';
}

/* ============================================================ SUPABASE STORAGE (foto) ============================================================ */
const STORAGE_BUCKET='wedding-photos';
async function uploadPhoto(blob,prefix){
  const path=`${currentUser.id}/${prefix}-${Date.now()}-${Math.random().toString(36).slice(2,7)}.jpg`;
  const {error}=await sb.storage.from(STORAGE_BUCKET).upload(path,blob,{contentType:'image/jpeg',cacheControl:'3600',upsert:false});
  if(error) throw error;
  const {data}=sb.storage.from(STORAGE_BUCKET).getPublicUrl(path);
  return {url:data.publicUrl, path};
}
async function deletePhoto(path){
  if(!path) return;
  try{ await sb.storage.from(STORAGE_BUCKET).remove([path]); }catch(e){ console.error(e); }
}

/* ---------- kompres foto agar ringan untuk disimpan ---------- */
function compressImage(file,maxW,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        resolve(cv.toDataURL('image/jpeg',quality));
      };
      img.onerror=reject; img.src=reader.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}
function compressImageToBlob(file,maxW,quality){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onload=()=>{
      const img=new Image();
      img.onload=()=>{
        let w=img.width, h=img.height;
        if(w>maxW){ h=Math.round(h*maxW/w); w=maxW; }
        const cv=document.createElement('canvas'); cv.width=w; cv.height=h;
        cv.getContext('2d').drawImage(img,0,0,w,h);
        cv.toBlob(b=> b?resolve(b):reject(new Error('compress failed')),'image/jpeg',quality);
      };
      img.onerror=reject; img.src=reader.result;
    };
    reader.onerror=reject; reader.readAsDataURL(file);
  });
}

async function generatePdf(){
  if(!window.html2canvas || !window.jspdf){ toast('Komponen PDF belum termuat, coba lagi sebentar'); return; }
  closeModal(); toast('Menyiapkan PDF…');
  buildPdfStage();
  await new Promise(r=>setTimeout(r,350));   // beri waktu font & layout siap
  try{
    const stage=$('#pdfStage');
    const scale=2;
    const canvas=await html2canvas(stage,{scale,backgroundColor:'#FFF9F4',useCORS:true,logging:false});
    const cw=canvas.width, chTotal=canvas.height;
    const pageCanvasPx=Math.floor(cw*297/210);   // tinggi 1 halaman A4 dalam piksel kanvas

    // Kumpulkan "batas aman" = bagian bawah tiap blok yang TIDAK boleh terpotong
    const stageTop=stage.getBoundingClientRect().top;
    const blocks=stage.querySelectorAll('.pdf-hero,.pdf-stats,.pdf-row,.pdf-total,.pdf-prog,.pdf-phase,.pdf-empty,.pdf-foot');
    const cuts=[];
    blocks.forEach(el=>{
      const bottom=(el.getBoundingClientRect().bottom-stageTop)*scale;
      cuts.push(Math.min(chTotal,Math.round(bottom)));
    });
    cuts.push(chTotal);
    const safe=[...new Set(cuts)].sort((a,b)=>a-b);

    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF('p','mm','a4');
    let y0=0, first=true, guard=0;
    while(y0<chTotal-1 && guard++<60){
      let y1=y0+pageCanvasPx;
      if(y1<chTotal){
        let best=-1;
        for(const c of safe){ if(c>y0+10 && c<=y1) best=c; }   // batas aman terbesar yg muat
        if(best>y0) y1=best;                                    // potong di gap antar-baris
      }else y1=chTotal;
      const sliceH=y1-y0;
      const pc=document.createElement('canvas');
      pc.width=cw; pc.height=sliceH;
      const ctx=pc.getContext('2d');
      ctx.fillStyle='#FFF9F4'; ctx.fillRect(0,0,cw,sliceH);
      ctx.drawImage(canvas,0,y0,cw,sliceH,0,0,cw,sliceH);
      const img=pc.toDataURL('image/jpeg',0.92);
      const imgH=sliceH*210/cw;   // tinggi gambar dalam mm (≤297)
      if(!first) pdf.addPage();
      pdf.setFillColor(255,249,244); pdf.rect(0,0,210,297,'F');
      pdf.addImage(img,'JPEG',0,0,210,imgH,undefined,'FAST');
      first=false; y0=y1;
    }
    const fn=`pernikahan-${(state.settings.partner1||'mempelai')}-${(state.settings.partner2||'pasangan')}.pdf`.toLowerCase().replace(/[^a-z0-9-]+/g,'-');
    pdf.save(fn);
    toast('PDF tersimpan 📄');
  }catch(e){ console.error(e); toast('Gagal membuat PDF'); }
  finally{ $('#pdfStage').innerHTML=''; }
}

/* ============================================================ HELPERS ============================================================ */
function esc(s){ return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
function hexA(hex,a){ const n=parseInt(hex.slice(1),16); return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${a})`; }
function formatDateID(iso){
  try{ return new Date(iso+'T00:00:00').toLocaleDateString('id-ID',{weekday:'long',day:'numeric',month:'long',year:'numeric'}); }
  catch(e){ return iso; }
}
let toastTimer=null;
function toast(msg){
  const t=$('#toast'); t.innerHTML=msg; t.classList.add('show');
  clearTimeout(toastTimer); toastTimer=setTimeout(()=>t.classList.remove('show'),2400);
}
function burst(x,y,n=36){
  if(reducedMotion) return;
  const layer=$('#confetti');
  for(let i=0;i<n;i++){
    const p=document.createElement('span'); p.className='confetti';
    p.style.left=x+'px'; p.style.top=y+'px';
    p.style.background=PALETTE[i%PALETTE.length];
    const ang=Math.random()*Math.PI*2, dist=50+Math.random()*150;
    p.style.setProperty('--dx',Math.cos(ang)*dist+'px');
    p.style.setProperty('--dy',(Math.sin(ang)*dist-80)+'px');
    layer.appendChild(p);
    setTimeout(()=>p.remove(),1100);
  }
}

/* ---------- lupa sandi via pertanyaan keamanan (mandiri, tanpa email/admin) ---------- */
async function forgotNext(){
  const u=($('#fg-user')?.value||'').trim();
  if(!u){ authError('Masukkan nama penggunamu dulu.'); return; }
  const login=toAuthEmail(u);
  const btn=$('[data-act="forgot-next"]'); if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span>'; }
  try{
    const {data,error}=await sb.rpc('get_security_question',{login});
    if(error) throw error;
    if(!data){ if(btn){btn.disabled=false;btn.textContent='Lanjut';} authError('Akun ini belum punya pertanyaan keamanan. Minta admin reset sandimu lewat Konsol Admin.'); return; }
    renderForgotStep2(login,data);
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Lanjut'; }
    const msg=(e&&e.message)||'';
    authError(/function|does not exist|schema|get_security_question|could not find|column/i.test(msg)?'Fitur belum aktif. Minta admin menjalankan SQL pertanyaan keamanan.':'Gagal: '+(msg||'coba lagi'));
  }
}

async function forgotReset(login){
  const ans=($('#fg-ans')?.value||'').trim();
  const p=$('#fg-pass')?.value||'';
  if(!ans){ authError('Isi jawaban keamananmu.'); return; }
  if(p.length<6){ authError('Kata sandi baru minimal 6 karakter.'); return; }
  const btn=$('[data-act="forgot-reset"]'); if(btn){ btn.disabled=true; btn.innerHTML='<span class="spin"></span>'; }
  try{
    const {error}=await sb.rpc('reset_password_with_answer',{login,answer:ans,new_password:p});
    if(error) throw error;
    toast('Kata sandi berhasil diganti 🔐');
    authMode='signin'; renderAuth();
    setTimeout(()=>{ const x=$('#au-email'); if(x) x.value=displayUser(login); const pf=$('#au-pass'); if(pf) pf.focus(); },80);
  }catch(e){
    if(btn){ btn.disabled=false; btn.textContent='Simpan Sandi Baru'; }
    const msg=(e&&e.message)||'';
    authError(msg.includes('salah')?'Jawaban keamanan salah, coba lagi.':(msg.includes('belum')?'Akun belum punya pertanyaan keamanan — minta admin reset.':'Gagal: '+(msg||'coba lagi')));
  }
}

  if(!email.includes('@')){ authError('Itu sepertinya nama pengguna. Reset lewat email hanya untuk akun email — hubungi admin untuk reset sandi.'); return; }
  const btn=$('#au-submit'); btn.disabled=true; btn.textContent='Mengirim…';
  try{
    const {error}=await sb.auth.resetPasswordForEmail(email,{redirectTo:location.origin+location.pathname});

    const body=$('#auth').querySelector('.auth-body');
    if(body) body.innerHTML=`<div style="text-align:center;padding:8px 0">

async function submitNewPassword(){
  const p1=$('#rp-pass').value||'', p2=$('#rp-pass2').value||'';
  if(p1.length<6){ resetError('Password minimal 6 karakter.'); return; }
  if(p1!==p2){ resetError('Password tidak sama, coba lagi.'); return; }
  const btn=$('#rp-submit'); btn.disabled=true; btn.textContent='Menyimpan…';
  try{
    const {error}=await sb.auth.updateUser({password:p1});
    if(error) throw error;
    recoveryMode=false;
    history.replaceState(null,'',location.pathname);   // bersihkan token dari URL
    toast('Password berhasil diubah 🔐');
    const {data:{session}}=await sb.auth.getSession();
    if(session && session.user){ currentUser=session.user; await resolveActiveWedding(); await cloudLoad(); subscribeRealtime(); enterApp(); }
    else { showAuth(); }
  }catch(e){ btn.disabled=false; btn.textContent='Simpan Password Baru'; resetError(translateAuthErr(e&&e.message)); }
}
function translateAuthErr(m){
  m=(m||'').toLowerCase();
  if(m.includes('invalid login')) return 'Nama pengguna atau kata sandi salah.';
  if(m.includes('already registered')) return 'Nama pengguna sudah dipakai. Pilih nama lain, atau klik “Masuk” bila itu akunmu.';
  if(m.includes('not confirmed')) return 'Akun belum aktif. Minta admin matikan "Confirm email" di Supabase.';
  if(m.includes('password')) return 'Kata sandi minimal 6 karakter.';
  if(m.includes('rate limit')) return 'Terlalu banyak percobaan. Coba lagi nanti.';
  return m ? ('Gagal: '+m) : 'Terjadi kesalahan, coba lagi.';
}
async function authSubmit(){
  const uname=($('#au-email').value||'').trim(), pass=$('#au-pass').value||'';
  if(!uname||!pass){ authError('Nama pengguna dan kata sandi wajib diisi.'); return; }
  const isEmailInput=uname.includes('@');
  if(authMode==='signup' && !isEmailInput){
    if(!/^[a-z0-9._-]{3,}$/i.test(uname)){ authError('Nama pengguna minimal 3 karakter — hanya huruf, angka, titik, garis bawah, atau strip.'); return; }
    if(!/[0-9]/.test(uname)){ authError('Nama pengguna wajib mengandung minimal 1 angka (mis. sanick88).'); return; }
  }
  if(pass.length<6){ authError('Kata sandi minimal 6 karakter.'); return; }
  if(authMode==='signup'){
    const seca=($('#au-seca')?.value||'').trim();
    if(seca.length<2){ authError('Isi jawaban pertanyaan keamanan (untuk pemulihan sandi).'); return; }
  }
  const email=toAuthEmail(uname);
  const btn=$('#au-submit'); btn.disabled=true; btn.innerHTML='<span class="spin"></span>';
  let res;
  try{
    res = authMode==='signup'
      ? await sb.auth.signUp({email,password:pass})
      : await sb.auth.signInWithPassword({email,password:pass});
  }catch(e){ res={error:{message:String(e)}}; }
  btn.disabled=false; btn.textContent= authMode==='signup'?'Daftar':'Masuk';
  if(res.error){ authError(translateAuthErr(res.error.message)); return; }
  if(authMode==='signup' && !res.data.session){
    authError('Akun dibuat! Matikan "Confirm email" di Supabase agar bisa langsung masuk, lalu klik Masuk.');
    switchAuthMode('signin'); return;
  }
  if(authMode==='signup' && res.data.session){
    const secq=$('#au-secq')?.value||SEC_QUESTIONS[0];
    const seca=($('#au-seca')?.value||'').trim();
    try{ await sb.rpc('set_security_qa',{question:secq,answer:seca}); }catch(e){ console.error('set_security_qa',e); }
  }
  // sukses → onAuthStateChange yang menampilkan app
}

async function copyText(t){
  try{ await navigator.clipboard.writeText(t); toast('Kode disalin 📋'); }
  catch(e){
    const ta=document.createElement('textarea'); ta.value=t; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select();
    try{ document.execCommand('copy'); toast('Kode disalin 📋'); }catch(_){ toast('Salin manual: '+t); }
    ta.remove();
  }
}
async function joinWedding(){
  const code=($('#joinCode').value||'').trim();
  if(!code){ toast('Masukkan kode undangan dulu'); return; }
  try{
    const {data,error}=await sb.rpc('join_wedding',{code});
    if(error) throw error;
    activeWeddingId=data.owner_id; isWeddingOwner=false; partnerOwnerEmail=data.owner_email||'';
    await cloudLoad(); subscribeRealtime();
    closeModal(); renderHero(); renderTabs(); renderView(); applyBranding();
    toast('Berhasil bergabung dengan pernikahan pasangan 💑');
  }catch(e){
    const msg=(e&&e.message)||'';
    let t='Gagal bergabung — cek kodenya';
    if(msg.includes('tidak ditemukan')) t='Kode tidak ditemukan';
    else if(msg.includes('sendiri')) t='Itu kode pernikahanmu sendiri';
    else if(msg.includes('sudah dipakai')) t='Kode sudah dipakai — pernikahan ini hanya untuk 2 akun (kamu & pasangan)';
    toast(t);
  }
}
async function leaveWedding(){
  if(!confirm('Keluar dari pernikahan bersama? Kamu akan kembali ke pernikahanmu sendiri.')) return;
  try{ await sb.from('wedding_members').delete().eq('owner_id',activeWeddingId).eq('member_id',currentUser.id); }catch(e){ console.error(e); }
  activeWeddingId=currentUser.id; isWeddingOwner=true; partnerOwnerEmail='';
  await cloudLoad(); subscribeRealtime();
  closeModal(); renderHero(); renderTabs(); renderView(); applyBranding();
  toast('Kembali ke pernikahanmu sendiri');
}
async function revokeMember(id){

  try{ await sb.from('wedding_members').delete().eq('owner_id',currentUser.id).eq('member_id',id); }catch(e){ console.error(e); }

}

let bgAudio=null, musicPlaying=false, musicVol=0.6;
function musicEnsure(){
  if(bgAudio) return bgAudio;
  bgAudio=new Audio();
  bgAudio.src=MUSIC_URL;
  bgAudio.loop=true;
  bgAudio.preload='none';
  bgAudio.volume=musicVol;
  bgAudio.addEventListener('play',()=>{ musicPlaying=true; });
  bgAudio.addEventListener('pause',()=>{ musicPlaying=false; });
  bgAudio.addEventListener('error',()=>{ musicPlaying=false; toast('Lagu belum bisa diputar. Pastikan file musik sudah diunggah ke repo.'); renderPersona(); });
  return bgAudio;
}
async function musicStart(){
  if(!MUSIC_URL){ toast('Musik belum diatur.'); return; }
  musicEnsure(); bgAudio.volume=musicVol;
  try{ await bgAudio.play(); musicPlaying=true; }
  catch(e){ musicPlaying=false; toast('Tidak bisa memutar musik. Coba lagi.'); }
  renderPersona();
}
function musicStop(){ if(bgAudio) bgAudio.pause(); musicPlaying=false; }
function musicSetVolume(v){ musicVol=Math.max(0,Math.min(1,v)); if(bgAudio) bgAudio.volume=musicVol; }

  const p=$('#personaPanel'); if(!p) return;
  const swatches=Object.keys(THEMES).map(id=>{

    return `<button class="sw${id===currentTheme?' on':''}" data-act="set-theme" data-theme="${id}" title="${t.label}" style="background:linear-gradient(135deg,${t.rose},${t.coral} 60%,${t.gold})"><span class="sw-lbl">${t.label}</span></button>`;
  }).join('');
  const musicSec = MUSIC_URL ? `
    <div class="persona-sec">
      <div class="persona-lbl">Musik</div>
      <div class="mus-ctl">
        <button class="mus-play" data-act="music-toggle">${musicPlaying?'⏸ Jeda':'▶ Putar'}</button>
        <input type="range" id="musVol" class="mus-vol" min="0" max="100" value="${Math.round(musicVol*100)}" aria-label="Volume">
      </div>
      <p class="persona-note" style="text-align:center;font-size:18px;margin-top:12px">🎵</p>
    </div>` : '';
  p.innerHTML=`
    <div class="persona-h"><b>✨ Personalisasi</b><button class="persona-x" data-act="toggle-personalize" aria-label="Tutup">✕</button></div>

async function loadFeedback(){
  const box=$('#feedbackAdmin'); if(!box) return;
  try{
    const {data,error}=await sb.from('feedback').select('*').order('created_at',{ascending:false});

    const baru=data.filter(f=>f.status!=='selesai').length;

  }catch(e){
    const m=(e&&e.message)||'';
    box.innerHTML='<p class="adm-note" style="margin:0;color:#be123c">'+(/relation|does not exist|table|schema cache|could not find/i.test(m)?'Tabel feedback belum dibuat. Jalankan SQL feedback di Supabase.':'Gagal memuat laporan.')+'</p>';
  }

function isAdat(t){ return ['jawa','minang','sunda','bali','islami'].includes(t); }
function bandSVG(theme,pos){
  const t=INV_THEMES[theme]||INV_THEMES.minimalis, c=t.ink, W=480, n=11, bw=W/n, baseY=24, amp=13;
  let d=`M0 0 H${W} V${baseY} `;
  for(let i=0;i<n;i++){ const x1=(W-(i+1)*bw).toFixed(1), xm=(W-i*bw-bw/2).toFixed(1); d+=`Q ${xm} ${baseY+amp} ${x1} ${baseY} `; }
  d+='Z';
  let fr='';
  for(let i=0;i<n;i++){ const xm=(W-i*bw-bw/2).toFixed(1); for(let b=0;b<3;b++){ fr+=`<circle cx="${xm}" cy="${(baseY+amp+3+b*5.5).toFixed(1)}" r="${(2-b*0.4).toFixed(1)}"/>`; } }
  const H=(baseY+amp+20).toFixed(1), g=`<g fill="${c}"><path d="${d}"/>${fr}</g>`;
  const inner = pos==='bottom' ? `<g transform="translate(0,${H}) scale(1,-1)">${g}</g>` : g;
  return `<svg class="inv-band" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" aria-hidden="true">${inner}</svg>`;
}

async function saveInvite(){
  const iv=state.invite;
  iv.quote=$('#iv-quote').value.trim();
  iv.greeting=$('#iv-greet').value.trim();
  iv.akad={date:$('#iv-akad-date').value,time:$('#iv-akad-time').value,place:$('#iv-akad-place').value.trim(),map:$('#iv-akad-map').value.trim()};
  iv.resepsi={date:$('#iv-res-date').value,time:$('#iv-res-time').value,place:$('#iv-res-place').value.trim(),map:$('#iv-res-map').value.trim()};
  iv.gift={bank:$('#iv-bank').value.trim(),rek:$('#iv-rek').value.trim(),name:$('#iv-rekname').value.trim(),ewallet:$('#iv-ewallet').value.trim(),note:$('#iv-giftnote').value.trim()};
  iv.on=$('#iv-on').checked;
  if(iv.on && !iv.slug) iv.slug=genInviteSlug();
  if(CLOUD_ENABLED && currentUser){ setSync('saving'); await cloudSave(); } else { save(); }
  toast(iv.on?'Undangan tersimpan & aktif 💌':'Undangan tersimpan');
  renderView();
}
function copyInviteLink(){ const u=inviteUrl(); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(u).then(()=>toast('Link disalin 🔗')).catch(()=>toast(u)); } else toast(u); }

function copyGuestLink(name){ const u=personalLink((name||'').trim()); if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(u).then(()=>toast('Link untuk '+((name||'').trim()||'tamu')+' disalin 🔗')).catch(()=>toast(u)); } else toast(u); }

function setInviteTheme(id){ if(!INV_THEMES[id]) return; state.invite.theme=id; save(); document.querySelectorAll('.iv-theme').forEach(b=>b.classList.toggle('on',b.dataset.theme===id)); toast('Tema undangan: '+INV_THEMES[id].label+' 🎨'); }
async function loadInviteResponses(){
  const box=$('#iv-responses'); if(!box) return;
  if(!(CLOUD_ENABLED && currentUser)){ box.innerHTML='<p class="sub" style="margin:0">Butuh mode online.</p>'; return; }
  try{
    const [rs,ws]=await Promise.all([
      sb.from('invite_rsvp').select('*').eq('wedding_id',activeWeddingId).order('created_at',{ascending:false}),
      sb.from('invite_wish').select('*').eq('wedding_id',activeWeddingId).order('created_at',{ascending:false})
    ]);
    if(rs.error||ws.error) throw (rs.error||ws.error);
    const rsvp=rs.data||[], wishes=ws.data||[];
    const hadir=rsvp.filter(r=>r.attending==='hadir').reduce((s,r)=>s+(r.headcount||1),0);
    const tidak=rsvp.filter(r=>r.attending==='tidak').length;
    let html=`<div class="mrow" style="margin-bottom:14px">${miniStat('Hadir',hadir+' org','mint')}${miniStat('Tidak Hadir',tidak+' org','coral')}</div>`;
    html+=`<div style="font-weight:800;font-size:13px;color:var(--ink-soft);margin:4px 0 8px">RSVP (${rsvp.length})</div>`;
    html+= rsvp.length ? rsvp.map(r=>`<div class="iv-resp"><div class="nm">${esc(r.name)} ${r.attending==='hadir'?'✅':'❌'} <span class="meta">· ${r.headcount||1} org · ${shortDate(r.created_at)}</span></div></div>`).join('') : '<p class="sub" style="margin:0 0 10px">Belum ada RSVP.</p>';
    html+=`<div style="font-weight:800;font-size:13px;color:var(--ink-soft);margin:14px 0 8px">Ucapan (${wishes.length})</div>`;
    html+= wishes.length ? wishes.map(w=>`<div class="iv-resp"><div class="nm">${esc(w.name)} <span class="meta">· ${shortDate(w.created_at)}</span> <button class="btn btn-ghost" data-act="del-wish" data-id="${w.id}" style="padding:3px 9px;float:right">Hapus</button></div><p>${esc(w.message)}</p></div>`).join('') : '<p class="sub" style="margin:0">Belum ada ucapan.</p>';
    box.innerHTML=html;
  }catch(e){
    const m=(e&&e.message)||'';
    box.innerHTML='<p class="sub" style="margin:0;color:#be123c">'+(/relation|does not exist|table|schema cache|could not find/i.test(m)?'Tabel undangan belum dibuat — jalankan SQL undangan digital di Supabase.':'Gagal memuat respon.')+'</p>';
  }
}
async function delWish(id){ if(!confirm('Hapus ucapan ini?')) return; try{ await sb.from('invite_wish').delete().eq('id',id); }catch(e){ console.error(e); } loadInviteResponses(); }

  const box=$('#invite'); if(!box) return;
  box.innerHTML='<div class="inv-loading">Membuka undangan…</div>';
  try{
    const {data,error}=await sb.rpc('get_invite',{p_slug:slug});
    if(error) throw error;
    if(!data){ box.innerHTML='<div class="inv-loading">💌 Undangan tidak ditemukan atau belum diaktifkan.</div>'; return; }
    const it=(data.invite&&data.invite.theme)||'';
    if(it && applyInviteTheme(it)){ document.body.setAttribute('data-invtheme',it); }
    else applyTheme(data.theme||'blush');

function spawnInvPetals(box){
  if(!box || box._petaled) return; box._petaled=true;
  const chars=['🌸','🌷','✨','💕','🤍','🌹'];
  for(let i=0;i<14;i++){
    const s=document.createElement('span'); s.className='inv-petal';
    s.textContent=chars[i%chars.length];
    s.style.left=Math.random()*100+'%';
    s.style.fontSize=(13+Math.random()*15)+'px';
    s.style.animationDuration=(7+Math.random()*8)+'s';
    s.style.animationDelay=(-Math.random()*12)+'s';
    box.appendChild(s);
  }
}
function setupInviteReveal(){
  const els=[...document.querySelectorAll('#invite .reveal')];
  if(!els.length) return;
  if(reducedMotion || !('IntersectionObserver' in window)){ els.forEach(el=>el.classList.add('in')); return; }
  const io=new IntersectionObserver((ents)=>{ ents.forEach(en=>{ if(en.isIntersecting){ en.target.classList.add('in'); io.unobserve(en.target); } }); },{threshold:.14,rootMargin:'0px 0px -8% 0px'});
  els.forEach(el=>io.observe(el));
}
let _invPrxBound=false;
function setupInviteParallax(){
  if(reducedMotion || _invPrxBound) return; _invPrxBound=true;
  const apply=(nx,ny)=>{ document.querySelectorAll('#invite .prx').forEach(el=>{ const dep=parseFloat(el.dataset.depth||'10'); el.style.transform=`translate3d(${(-nx*dep).toFixed(1)}px,${(-ny*dep).toFixed(1)}px,0)`; }); };
  window.addEventListener('mousemove',e=>{ apply((e.clientX/window.innerWidth-.5)*2,(e.clientY/window.innerHeight-.5)*2); },{passive:true});
  window.addEventListener('deviceorientation',e=>{ if(e.gamma==null && e.beta==null) return; const nx=Math.max(-1,Math.min(1,(e.gamma||0)/28)), ny=Math.max(-1,Math.min(1,((e.beta||0)-40)/28)); apply(nx,ny); },{passive:true});
}

function startInviteCountdown(dateIso){
  clearInterval(invCdTimer);
  const cd=$('#invCd'); if(!cd||!dateIso) return;
  const target=new Date(dateIso+'T00:00:00').getTime();
  const b=cd.querySelectorAll('b');
  const tick=()=>{
    const diff=target-Date.now();
    if(diff<=0){ b.forEach(x=>x.textContent='0'); clearInterval(invCdTimer); return; }
    const d=Math.floor(diff/86400000), h=Math.floor(diff/3600000)%24, m=Math.floor(diff/60000)%60, s=Math.floor(diff/1000)%60;
    if(b[0])b[0].textContent=d; if(b[1])b[1].textContent=h; if(b[2])b[2].textContent=m; if(b[3])b[3].textContent=s;
  };
  tick(); invCdTimer=setInterval(tick,1000);
}
